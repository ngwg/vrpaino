name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA from Xcode project
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build unsigned IPA
        run: |
          cd Build/iOS

          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData

          APP=$(find DerivedData -name "*.app" | grep -v ".dSYM" | head -1)
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r vrpaino.ipa Payload/
          echo "Done"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: vrpaino-ipa
          path: Build/iOS/vrpaino.ipa
          retention-days: 7
