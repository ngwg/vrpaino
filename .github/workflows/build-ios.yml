name: Build iOS Swift

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: swift
        run: xcodegen generate

      - name: Show generated Info.plist (source)
        working-directory: swift
        run: |
          echo "=== Sources/Info.plist generated by xcodegen ==="
          cat Sources/Info.plist || echo "NO INFO.PLIST GENERATED"

      - name: Build app
        working-directory: swift
        run: |
          xcodebuild \
            -project VRPiano.xcodeproj \
            -scheme VRPiano \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/build/Products" \
            build

      - name: Verify Info.plist inside built .app
        run: |
          echo "=== Info.plist inside the built VRPiano.app ==="
          plutil -p build/Products/VRPiano.app/Info.plist || echo "NO INFO.PLIST IN APP"
          echo ""
          echo "=== Camera key present? ==="
          plutil -extract NSCameraUsageDescription raw build/Products/VRPiano.app/Info.plist \
            && echo "✓ NSCameraUsageDescription is in the IPA" \
            || echo "✗ NSCameraUsageDescription IS MISSING"

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Products/VRPiano.app build/Payload/
          cd build && zip -r VRPiano.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VRPiano-Swift
          path: build/VRPiano.ipa
          retention-days: 7
