name: Build iOS Swift

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: swift
        run: xcodegen generate

      - name: Build app
        working-directory: swift
        run: |
          xcodebuild \
            -project VRPiano.xcodeproj \
            -scheme VRPiano \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/build/Products" \
            build

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Products/VRPiano.app build/Payload/
          cd build && zip -r VRPiano.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VRPiano-Swift
          path: build/VRPiano.ipa
          retention-days: 7
