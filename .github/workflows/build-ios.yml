name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA from Xcode project
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build unsigned app
        run: |
          cd Build/iOS

          xcodebuild \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath DerivedData

      - name: Package IPA
        run: |
          cd Build/iOS
          APP=$(find DerivedData -type d -name "*.app" -not -path "*.dSYM/*" | head -1)
          echo "Found app: $APP"

          mkdir -p Payload
          cp -r "$APP" Payload/
          cd Payload
          zip -r ../vrpaino.ipa .
          cd ..
          echo "IPA size: $(du -h vrpaino.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: vrpaino-ipa
          path: Build/iOS/vrpaino.ipa
          retention-days: 7
