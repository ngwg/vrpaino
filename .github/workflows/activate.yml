name: Get Unity License File

on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Generate activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getActivationFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.5.0f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v6000.5.0f1.alf
          path: ${{ steps.getActivationFile.outputs.filePath }}
