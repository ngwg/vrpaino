<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VR Piano">
  <title>VR Piano</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;height:100%;
      background:#000;overflow:hidden;
      font-family:-apple-system,sans-serif;
      touch-action:none;
    }
    #video{
      position:fixed;inset:0;
      width:100%;height:100%;
      object-fit:cover;
    }
    #canvas{
      position:fixed;inset:0;
      width:100%;height:100%;
    }
    #splash{
      position:fixed;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:24px;
      background:rgba(0,0,0,.82);
    }
    #splash h1{color:#fff;font-size:32px;letter-spacing:1px}
    #splash p{color:#aaa;font-size:15px;text-align:center;max-width:280px;line-height:1.5}
    #startBtn{
      background:#fff;color:#000;
      font-size:20px;font-weight:700;
      padding:18px 52px;border:none;
      border-radius:14px;cursor:pointer;
    }
    #errMsg{
      position:fixed;
      top:max(16px,env(safe-area-inset-top,16px));
      left:50%;transform:translateX(-50%);
      background:rgba(255,255,255,.93);
      color:#000;font-size:14px;font-weight:600;
      padding:10px 18px;border-radius:10px;
      text-align:center;max-width:90vw;
      display:none;z-index:99;
    }
  </style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="splash">
  <h1>🎹 VR Piano</h1>
  <p>Point your camera at your piano. Notes fall to show what to play next.</p>
  <button id="startBtn">▶ START</button>
  <p style="color:#666;font-size:13px">For VR headset: add to Home Screen first</p>
</div>
<div id="errMsg"></div>

<script>
'use strict';
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const splash   = document.getElementById('splash');
const startBtn = document.getElementById('startBtn');
const errMsg   = document.getElementById('errMsg');
const ctx      = canvas.getContext('2d');

// ─── resize ──────────────────────────────────────────────────────────────────
function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── start ───────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  splash.style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' }, width:{ ideal:1920 }, height:{ ideal:1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  } catch(e){
    showErr('Camera error – allow camera access and refresh.\n' + e.message);
  }
  requestAnimationFrame(loop);
});

function showErr(txt){
  errMsg.textContent = txt;
  errMsg.style.display = 'block';
  setTimeout(()=>{ errMsg.style.display='none'; }, 4000);
}

// ─── keyboard geometry ────────────────────────────────────────────────────────
const NUM_WHITE   = 14;   // C4–B5, two octaves
const BLACK_SLOTS = [0.6, 1.6, 3.6, 4.6, 5.6, 7.6, 8.6, 10.6, 11.6, 12.6];

function kbRect(){
  const h = canvas.height, w = canvas.width;
  const kh = Math.min(h * 0.25, 180);
  return { x:0, y:h-kh, w, h:kh };
}
function wkRect(i){          // white-key i → screen rect
  const kb = kbRect(), ww = kb.w / NUM_WHITE;
  return { x: i*ww+1, y: kb.y+2, w: ww-2, h: kb.h-6 };
}

// ─── drawing ──────────────────────────────────────────────────────────────────
const flashAt = {};   // whiteIndex → performance.now() of last hit

function drawKeyboard(now){
  const kb  = kbRect(), ww = kb.w / NUM_WHITE;
  const FLASH = 220; // ms

  ctx.fillStyle = 'rgba(12,12,12,.85)';
  ctx.fillRect(kb.x, kb.y, kb.w, kb.h);

  for(let i=0;i<NUM_WHITE;i++){
    const r = wkRect(i);
    const lit = flashAt[i] && (now - flashAt[i]) < FLASH;
    ctx.fillStyle = lit ? '#00e8ff' : '#f4f4f4';
    rrect(r.x, r.y, r.w, r.h, 3);
    ctx.fill();
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }

  const bw = ww*0.58, bh = kb.h*0.60;
  for(const pos of BLACK_SLOTS){
    ctx.fillStyle = '#111';
    rrect(pos*ww - bw/2, kb.y+2, bw, bh, 2);
    ctx.fill();
  }
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,   x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,  y+h,x,  y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,  y,  x+r,y);
  ctx.closePath();
}

// ─── song ─────────────────────────────────────────────────────────────────────
// White-key indices: C=0 D=1 E=2 F=3 G=4 A=5 B=6 (first octave)
const BPM      = 78;
const BEAT     = 60 / BPM;   // seconds per beat
const FALL_DUR = 2.0;         // seconds a note takes to fall

// Twinkle Twinkle Little Star  [white-key-index, duration-in-beats]
const SONG_DEF = [
  [0,1],[0,1],[4,1],[4,1],[5,1],[5,1],[4,2],
  [3,1],[3,1],[2,1],[2,1],[1,1],[1,1],[0,2],
  [4,1],[4,1],[3,1],[3,1],[2,1],[2,1],[1,2],
  [4,1],[4,1],[3,1],[3,1],[2,1],[2,1],[1,2],
  [0,1],[0,1],[4,1],[4,1],[5,1],[5,1],[4,2],
  [3,1],[3,1],[2,1],[2,1],[1,1],[1,1],[0,2],
];

const songEvents = [];
let songDuration = 0;
(()=>{
  let t = 0;
  for(const [wi, beats] of SONG_DEF){
    songEvents.push({ wi, time: t });
    t += beats * BEAT;
  }
  songDuration = t + BEAT * 4;   // pause before loop
})();

// ─── game state ───────────────────────────────────────────────────────────────
let notes    = [];   // { wi, age }
let songTime = 0;    // ever-increasing wall time (seconds)
let lastTs   = null;
let lastDt   = 0;

// Spawn tracking: per song-iteration
let curIter       = 0;
let spawnedInIter = 0;   // how many events spawned in curIter

function spawnDue(){
  const iterBase = curIter * songDuration;
  const newIter  = Math.floor(songTime / songDuration);

  if(newIter !== curIter){
    curIter       = newIter;
    spawnedInIter = 0;
  }

  while(spawnedInIter < songEvents.length){
    const ev       = songEvents[spawnedInIter];
    const playTime = iterBase + ev.time;
    if(playTime - FALL_DUR <= songTime){
      const age = Math.max(0, songTime - (playTime - FALL_DUR));
      notes.push({ wi: ev.wi, age });
      spawnedInIter++;
    } else {
      break;
    }
  }
}

// ─── main loop ────────────────────────────────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);
  if(lastTs === null){ lastTs = ts; return; }
  lastDt   = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs   = ts;
  songTime += lastDt;

  spawnDue();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const areaH = kbRect().y;   // height of note-fall zone
  const now   = ts;

  notes = notes.filter(n => {
    n.age += lastDt;
    const prog = n.age / FALL_DUR;

    if(prog >= 1){
      flashAt[n.wi] = now;
      return false;
    }

    const kr = wkRect(n.wi);
    const nw = kr.w * 0.80, nh = 26;
    const nx = kr.x + (kr.w - nw) / 2;
    const ny = prog * areaH - nh;

    // note body
    const alpha = 0.55 + 0.4 * prog;
    ctx.fillStyle = `rgba(0,210,255,${alpha})`;
    rrect(nx, ny, nw, nh, 5);
    ctx.fill();
    // bright border
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    return true;
  });

  drawKeyboard(now);
}
</script>
</body>
</html>
