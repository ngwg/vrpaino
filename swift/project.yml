name: VRPiano
options:
  bundleIdPrefix: com.dovyllis
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  VRPiano:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dovyllis.vrpiano
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        ENABLE_BITCODE: "NO"
